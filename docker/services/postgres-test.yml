# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/master/schema/compose-spec.json

# Test Database Service
#
# Ephemeral PostgreSQL instance for running e2e tests.
# Uses a distinct port (5440) and credentials so it can run alongside
# the dev database (5433) without conflict.
#
# No persistent volume — data is intentionally discarded between test runs.

version: '3.8'

services:
  postgres-test:
    image: postgres:15-alpine
    container_name: chardb-postgres-test
    environment:
      POSTGRES_DB: chardb_test
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d chardb_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
